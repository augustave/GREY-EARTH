# ═══════════════════════════════════════════════════════════════════
# SIGINT-TERRAIN DESIGN SYSTEM — v1.1 ADDENDUM
# TEXTURES & ELEVATIONS
# ═══════════════════════════════════════════════════════════════════
#
# Extends v1.0 with full texture language and elevation systems.
# Reference Datum: 40° 41' 6.31" N, 73° 57' 46.42" W
# MGRS: 18T WL 85438 05964
#
# Author: ANP Studio
# Date: 2026-03-23
# ═══════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════
# § 7 — TEXTURE SYSTEM
# ═══════════════════════════════════════════════════════════════════

textures:
  philosophy: >
    Texture is the interface's fingerprint. In conventional UI,
    surfaces are flat planes. In SIGINT-TERRAIN, every surface
    carries micro-information — grain density signals data
    confidence, hatching direction signals slope aspect, noise
    amplitude signals sensor uncertainty. Texture is never
    cosmetic; it encodes operational state.

  # ─────────────────────────────────────────────────────────────────
  # 7.1 — Terrain Surface Textures
  # ─────────────────────────────────────────────────────────────────

  terrain_surfaces:
    hillshade_grain:
      description: >
        The primary terrain texture. Derived from DEM oblique
        illumination. The grain direction and shadow depth
        communicate slope steepness and aspect without color.
      parameters:
        illumination_azimuth: 315       # NW, cartographic standard
        illumination_altitude: 45       # degrees above horizon
        z_exaggeration: 1.5             # vertical scale multiplier
        ambient_light: 0.3              # fill-light ratio (0=harsh, 1=flat)
        multi_directional: true         # average 4 azimuths for even coverage
        azimuths_if_multi: [315, 45, 135, 225]
      css_implementation: >
        Generated server-side as raster tiles. No CSS equivalent.
        For UI panels that simulate terrain texture, use:
        background-image: repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 1px,
          rgba(255,255,255,0.02) 1px,
          rgba(255,255,255,0.02) 2px
        );
      rendering_notes: >
        At zoom < 10, hillshade reads as smooth undulation.
        At zoom 10–14, individual ridge crests become legible.
        At zoom > 14, micro-terrain (building shadows in LiDAR
        DEM) begins to dominate — blend down hillshade opacity
        to 40% and let satellite imagery carry detail.

    contour_hatching:
      description: >
        Hachure-style hatching along slope fall lines. Used
        in high-contrast tactical maps where hillshade alone
        doesn't communicate gradient severity.
      parameters:
        line_weight: "0.3px"
        line_spacing: "Proportional to slope — steeper = denser"
        spacing_rules:
          slope_0_5deg: "No hatching — flat terrain"
          slope_5_15deg: "8px spacing — gentle slope"
          slope_15_30deg: "4px spacing — moderate slope"
          slope_30_45deg: "2px spacing — steep terrain"
          slope_45_plus: "1px spacing + bold weight 0.6px — cliff/escarpment"
        color: "rgba(255, 255, 255, 0.12)"
        direction: "Perpendicular to contour lines (downslope)"
      svg_pattern: |
        <pattern id="hachure-steep" width="3" height="8"
          patternUnits="userSpaceOnUse" patternTransform="rotate(-45)">
          <line x1="0" y1="0" x2="0" y2="8"
            stroke="rgba(255,255,255,0.12)" stroke-width="0.3"/>
        </pattern>
      use_cases:
        - "Slope analysis overlays"
        - "Landing zone assessment maps"
        - "Mobility corridor planning (vehicle trafficability)"

    stipple_noise:
      description: >
        Fine-grain dot noise applied to terrain surfaces to
        simulate sensor acquisition texture — the visual
        equivalent of film grain in reconnaissance imagery.
      parameters:
        density:
          low_confidence: "σ=8, 40% coverage — heavy grain, uncertain data"
          medium_confidence: "σ=4, 20% coverage — moderate grain"
          high_confidence: "σ=2, 8% coverage — clean, high-res source"
          synthetic: "σ=1, 3% coverage — modeled/interpolated data"
        dot_size: "0.5–1.0px"
        color: "rgba(255, 255, 255, 0.06)"
        blend_mode: "screen"
      svg_pattern: |
        <filter id="grain">
          <feTurbulence type="fractalNoise" baseFrequency="0.65"
            numOctaves="3" stitchTiles="stitch"/>
          <feColorMatrix type="saturate" values="0"/>
          <feComponentTransfer>
            <feFuncA type="discrete" tableValues="0 0.04"/>
          </feComponentTransfer>
          <feBlend in="SourceGraphic" mode="screen"/>
        </filter>
      operational_meaning: >
        Grain density is NOT decorative. It communicates data
        provenance. An operator can glance at a region and
        know whether the terrain data comes from high-res
        LiDAR (clean) or interpolated SRTM (grainy). This
        is critical for route planning and landing zone
        selection.

    scan_line_overlay:
      description: >
        Horizontal scan lines reminiscent of CRT/radar
        displays. Applied to active sensor feeds and
        real-time video ingest panels.
      parameters:
        line_spacing: "2px"
        line_weight: "1px"
        opacity: 0.04
        color: "#000000"
        animation: "Vertical crawl at 0.5px/frame for live feeds"
      css_implementation: |
        background-image: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 1px,
          rgba(0, 0, 0, 0.04) 1px,
          rgba(0, 0, 0, 0.04) 2px
        );
        background-size: 100% 2px;
      use_cases:
        - "Live video feeds from UAV/satellite"
        - "Radar PPI scope overlays"
        - "Active sensor data panels (as opposed to stored data)"

  # ─────────────────────────────────────────────────────────────────
  # 7.2 — UI Surface Textures
  # ─────────────────────────────────────────────────────────────────

  ui_surfaces:
    panel_substrate:
      description: >
        The background texture for UI panels. Communicates
        that panels are transparent overlays on the terrain,
        not opaque containers.
      layers:
        - name: "Backdrop blur"
          value: "backdrop-filter: blur(12px) saturate(0.8)"
        - name: "Dark tint"
          value: "background: rgba(0, 0, 0, 0.82)"
        - name: "Micro-noise"
          value: >
            background-image: url('data:image/svg+xml,...')
            using feTurbulence at baseFrequency 0.9, opacity 0.03
        - name: "Inner border glow"
          value: "box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06)"
      states:
        default:
          opacity: 0.82
          blur: "12px"
        hover:
          opacity: 0.86
          border_color: "rgba(255, 255, 255, 0.10)"
        active:
          opacity: 0.90
          border_color: "rgba(0, 255, 65, 0.15)"
        focused:
          opacity: 0.88
          border_color: "rgba(0, 255, 65, 0.30)"
          box_shadow: "0 0 0 2px rgba(0, 255, 65, 0.15)"

    data_cell_texture:
      description: >
        Subtle differentiation between data rows/cells
        without harsh borders. Uses alternating micro-opacity
        shifts instead of visible divider lines.
      implementation:
        even_row: "background: transparent"
        odd_row: "background: rgba(255, 255, 255, 0.02)"
        hover_row: "background: rgba(255, 255, 255, 0.05)"
        selected_row: "background: rgba(0, 255, 65, 0.06)"
        divider: "border-bottom: 1px solid rgba(255, 255, 255, 0.04)"

    crosshatch_overlay:
      description: >
        Fine diagonal crosshatch applied to denied/contested
        areas on the map. Signals that the region has degraded
        sensor coverage or is under adversary control.
      parameters:
        line_weight: "0.5px"
        spacing: "6px"
        angle: "45deg and -45deg (crossed)"
        color: "rgba(255, 45, 45, 0.15)"
      svg_pattern: |
        <pattern id="denied-zone" width="6" height="6"
          patternUnits="userSpaceOnUse">
          <line x1="0" y1="6" x2="6" y2="0"
            stroke="rgba(255,45,45,0.15)" stroke-width="0.5"/>
          <line x1="0" y1="0" x2="6" y2="6"
            stroke="rgba(255,45,45,0.15)" stroke-width="0.5"/>
        </pattern>
      use_cases:
        - "Denied airspace / no-fly zones"
        - "Contested terrain under adversary fire control"
        - "Degraded sensor coverage areas"
        - "Communication blackout regions"

    uncertainty_wash:
      description: >
        Semi-transparent color wash indicating data age or
        confidence level. Applied as a full-region overlay
        that degrades terrain visibility proportionally.
      tiers:
        current:     { age: "< 30 min",  color: "none",                         label: "CURRENT" }
        recent:      { age: "30m – 2h",  color: "rgba(255, 136, 0, 0.08)",      label: "RECENT" }
        aging:       { age: "2h – 6h",   color: "rgba(255, 136, 0, 0.15)",      label: "AGING" }
        stale:       { age: "6h – 24h",  color: "rgba(255, 45, 45, 0.12)",      label: "STALE" }
        historical:  { age: "> 24h",     color: "rgba(255, 45, 45, 0.22)",      label: "HISTORICAL" }

  # ─────────────────────────────────────────────────────────────────
  # 7.3 — Texture Compositing Rules
  # ─────────────────────────────────────────────────────────────────

  compositing:
    layer_order:
      - "1. Satellite base imagery (normal blend)"
      - "2. DEM hillshade (overlay blend, 55–65% opacity)"
      - "3. Contour hatching if slope overlay active (multiply, 100%)"
      - "4. Stipple noise for confidence encoding (screen, variable)"
      - "5. Uncertainty wash for data age (normal, variable)"
      - "6. Crosshatch for denied zones (normal, 100%)"
      - "7. Scan lines for live sensor feeds only (normal, 4%)"

    performance_budget:
      max_simultaneous_textures: 3
      note: >
        On mobile / field displays, reduce to hillshade +
        one operational texture only. Stipple noise and scan
        lines are dropped first. Contour hatching simplifies
        to every-other-line at zoom < 12.

# ═══════════════════════════════════════════════════════════════════
# § 8 — ELEVATION SYSTEM
# ═══════════════════════════════════════════════════════════════════

elevation:
  philosophy: >
    Elevation is the third axis of every decision. Route
    planning, line-of-sight analysis, landing zone selection,
    and weapons engagement zones all depend on terrain height.
    The system must communicate elevation through multiple
    simultaneous channels: relief shading (implicit), contour
    lines (explicit), hypsometric tinting (optional), and
    profile cross-sections (on demand).

  # ─────────────────────────────────────────────────────────────────
  # 8.1 — Data Sources & Resolution
  # ─────────────────────────────────────────────────────────────────

  data_sources:
    primary:
      name: "USGS 3DEP 1m LiDAR"
      resolution: "1 meter"
      coverage: "CONUS — full coverage for NYC datum"
      format: "Cloud Optimized GeoTIFF (COG)"
      vertical_datum: "NAVD88"
      accuracy: "±0.1m vertical (bare earth)"
      acquisition: "Airborne LiDAR, multiple flight campaigns"
      url: "https://www.usgs.gov/3d-elevation-program"
      use: "Primary terrain mesh, building detection, micro-relief"

    secondary:
      name: "Copernicus GLO-30 DEM"
      resolution: "30 meters"
      coverage: "Global"
      format: "GeoTIFF"
      vertical_datum: "EGM2008"
      accuracy: "±4m vertical (LE90)"
      url: "https://spacedata.copernicus.eu"
      use: "Fallback for areas outside 3DEP coverage, global context"

    tertiary:
      name: "ALOS World 3D (AW3D30)"
      resolution: "30 meters (12.5m available)"
      coverage: "Global (±60° latitude)"
      format: "GeoTIFF"
      vertical_datum: "EGM96"
      accuracy: "±5m vertical"
      url: "https://www.eorc.jaxa.jp/ALOS/en/aw3d30/"
      use: "Cross-reference, void fill for Copernicus gaps"

    bathymetric:
      name: "NOAA Coastal Relief Model"
      resolution: "3 arc-second (~90m) to 1/9 arc-second (~3m)"
      coverage: "US coastal waters"
      format: "NetCDF / GeoTIFF"
      vertical_datum: "MLLW (Mean Lower Low Water)"
      url: "https://www.ngdc.noaa.gov/mgg/coastal/crm.html"
      use: "Sub-surface terrain for harbor/littoral operations"
      note: >
        Critical for the NYC datum — harbor approach sector
        requires merged topographic + bathymetric DEM for
        continuous terrain model across the waterline.

  # ─────────────────────────────────────────────────────────────────
  # 8.2 — Elevation Rendering Modes
  # ─────────────────────────────────────────────────────────────────

  rendering_modes:
    hillshade:
      description: "Default terrain visualization — oblique illumination"
      when: "Always active as base terrain layer"
      parameters:
        azimuth: 315
        altitude: 45
        z_factor_by_zoom:
          zoom_0_6:   { z: 30.0,  note: "Extreme exaggeration for global view" }
          zoom_7_10:  { z: 5.0,   note: "Regional terrain features visible" }
          zoom_11_13: { z: 2.0,   note: "Local relief, valley/ridge structure" }
          zoom_14_16: { z: 1.5,   note: "Standard cartographic exaggeration" }
          zoom_17_20: { z: 1.0,   note: "True vertical scale, building detail" }
      output: "Single-channel grayscale, 0–255"

    contour_lines:
      description: "Isohypse lines at regular elevation intervals"
      when: "Toggled by operator or auto-enabled in slope analysis mode"
      parameters:
        intervals:
          index_contour:
            interval_m: 50
            stroke: "rgba(255, 255, 255, 0.35)"
            width: "1.0px"
            label: true
            label_font: "primary monospace, 9px"
            label_color: "rgba(255, 255, 255, 0.5)"
            label_spacing: "Every 4th contour segment"
          intermediate_contour:
            interval_m: 10
            stroke: "rgba(255, 255, 255, 0.12)"
            width: "0.4px"
            label: false
          supplementary_contour:
            interval_m: 5
            stroke: "rgba(255, 255, 255, 0.06)"
            width: "0.25px"
            label: false
            when: "Zoom ≥ 15 and slope < 5°"
        depression_contours:
          style: "Tick marks on downslope side"
          tick_length: "3px"
          tick_spacing: "8px"
        cliff_symbol:
          threshold: "slope > 60°"
          style: "Barbed line (teeth on downslope side)"
      rendering_notes: >
        Contours are vector-rendered from DEM on-the-fly.
        At zoom < 11, only index contours display. At zoom
        11–14, intermediate contours appear. Supplementary
        contours only at zoom ≥ 15 in flat terrain where
        intermediate spacing is too coarse for navigation.

    hypsometric_tinting:
      description: >
        Elevation-to-color mapping. Disabled by default in
        tactical mode (monochrome is standard). Available as
        an analysis overlay for terrain assessment.
      when: "Operator-toggled for elevation analysis"
      palette:
        name: "TACTICAL HYPSO"
        note: >
          Muted, desaturated palette — NOT the rainbow relief
          maps from geography textbooks. Colors must not
          interfere with operational overlay legibility.
        bands:
          - { range_m: [-50, 0],     color: "#0a1628", label: "Sub-sea" }
          - { range_m: [0, 10],      color: "#12201a", label: "Littoral" }
          - { range_m: [10, 50],     color: "#1a2e1c", label: "Low coastal" }
          - { range_m: [50, 100],    color: "#2a3422", label: "Lowland" }
          - { range_m: [100, 250],   color: "#3a3a22", label: "Upland" }
          - { range_m: [250, 500],   color: "#4a3a1a", label: "Highland" }
          - { range_m: [500, 1000],  color: "#4a2a1a", label: "Montane" }
          - { range_m: [1000, 2000], color: "#3a1a1a", label: "Alpine" }
          - { range_m: [2000, 4000], color: "#2a1215", label: "High alpine" }
          - { range_m: [4000, 9000], color: "#f2f2f2", label: "Nival/ice" }
        blend_mode: "multiply"
        opacity: 0.4
        note_nyc: >
          For the NYC datum (max elevation ~125m at
          Todt Hill, Staten Island), only the first 5 bands
          are relevant. The palette compresses into a narrow
          green-to-brown range that distinguishes harbor-level
          from ridge-level terrain.

    slope_analysis:
      description: "Slope angle visualization for trafficability assessment"
      when: "Operator-toggled for route planning and LZ selection"
      palette:
        name: "SLOPE SEVERITY"
        bands:
          - { range_deg: [0, 3],    color: "rgba(0, 255, 65, 0.2)",  label: "Flat — all vehicles" }
          - { range_deg: [3, 10],   color: "rgba(0, 255, 65, 0.1)",  label: "Gentle — wheeled vehicles" }
          - { range_deg: [10, 20],  color: "rgba(255, 204, 0, 0.15)", label: "Moderate — tracked only" }
          - { range_deg: [20, 30],  color: "rgba(255, 136, 0, 0.2)", label: "Steep — dismounted only" }
          - { range_deg: [30, 45],  color: "rgba(255, 45, 45, 0.2)", label: "Severe — technical climb" }
          - { range_deg: [45, 90],  color: "rgba(255, 45, 45, 0.35)", label: "Cliff — impassable" }

    aspect_analysis:
      description: "Slope facing direction — critical for solar exposure and wind"
      when: "Operator-toggled for environmental assessment"
      palette:
        name: "ASPECT COMPASS"
        bands:
          - { range_deg: [337.5, 22.5],  color: "rgba(0, 191, 255, 0.15)",  label: "N — cold shadow" }
          - { range_deg: [22.5, 67.5],   color: "rgba(0, 191, 255, 0.08)",  label: "NE" }
          - { range_deg: [67.5, 112.5],  color: "rgba(255, 204, 0, 0.08)",  label: "E — morning sun" }
          - { range_deg: [112.5, 157.5], color: "rgba(255, 204, 0, 0.12)",  label: "SE" }
          - { range_deg: [157.5, 202.5], color: "rgba(255, 136, 0, 0.15)",  label: "S — full sun" }
          - { range_deg: [202.5, 247.5], color: "rgba(255, 136, 0, 0.12)",  label: "SW" }
          - { range_deg: [247.5, 292.5], color: "rgba(204, 153, 0, 0.08)",  label: "W — afternoon sun" }
          - { range_deg: [292.5, 337.5], color: "rgba(0, 191, 255, 0.08)",  label: "NW" }

  # ─────────────────────────────────────────────────────────────────
  # 8.3 — Elevation Profile System
  # ─────────────────────────────────────────────────────────────────

  profile:
    description: >
      On-demand cross-section view along any transect line.
      Displayed as a lower-third panel showing the terrain
      profile with elevation scale, distance markers, and
      line-of-sight analysis.

    rendering:
      panel_height: "180px expanded, 64px collapsed"
      background: "rgba(0, 0, 0, 0.85)"
      grid:
        horizontal: "rgba(255, 255, 255, 0.06) at elevation intervals"
        vertical: "rgba(255, 255, 255, 0.04) at distance intervals"
      terrain_fill:
        above_ground: "linear-gradient(180deg, rgba(107,117,109,0.6) 0%, rgba(26,30,28,0.9) 100%)"
        below_sea: "linear-gradient(180deg, rgba(10,22,40,0.9) 0%, rgba(10,22,40,0.4) 100%)"
      terrain_stroke:
        color: "rgba(255, 255, 255, 0.5)"
        width: "1px"
      elevation_labels:
        font: "primary monospace, 10px"
        color: "rgba(255, 255, 255, 0.5)"
        position: "Left axis"
      distance_labels:
        font: "primary monospace, 10px"
        color: "rgba(255, 255, 255, 0.4)"
        position: "Bottom axis"
        units: "m below 5km, km above"

    line_of_sight:
      description: >
        Overlay on elevation profile showing whether two
        points have clear LOS or terrain masking.
      rendering:
        los_clear:
          stroke: "#00ff41"
          width: "1px"
          dash: "none"
          opacity: 0.6
        los_masked:
          stroke: "#ff2d2d"
          width: "1px"
          dash: "4 2"
          opacity: 0.4
        mask_region:
          fill: "rgba(255, 45, 45, 0.08)"
          description: "Shaded region where terrain blocks LOS"
      observer_height: "2m default (standing), configurable"
      target_height: "0m default (ground level), configurable"

    fresnel_zone:
      description: >
        Radio frequency Fresnel zone clearance overlay.
        Critical for comms planning — LOS alone is not
        sufficient; the Fresnel ellipsoid must clear terrain.
      rendering:
        first_fresnel:
          stroke: "#00ffff"
          width: "0.5px"
          dash: "2 4"
          fill: "rgba(0, 255, 255, 0.04)"
        clearance_pass:
          color: "#00ff41"
          label: "CLEAR"
        clearance_fail:
          color: "#ff2d2d"
          label: "MASKED"
      frequencies:
        - { freq_mhz: 150,  label: "VHF", note: "Wide Fresnel, terrain-sensitive" }
        - { freq_mhz: 450,  label: "UHF", note: "Moderate Fresnel" }
        - { freq_mhz: 2400, label: "S-band", note: "Narrow Fresnel, near-LOS" }
        - { freq_mhz: 5800, label: "C-band", note: "Very narrow, LOS-dependent" }

  # ─────────────────────────────────────────────────────────────────
  # 8.4 — 3D Terrain Rendering
  # ─────────────────────────────────────────────────────────────────

  terrain_3d:
    description: >
      Perspective terrain mesh for situational awareness
      and briefing displays. Not the default view — toggled
      for specific analysis tasks.

    mesh:
      engine: "Three.js InstancedMesh or custom WebGL"
      geometry: "Heightfield from DEM, triangle strip"
      lod_levels:
        - { zoom: "< 10",  resolution: "1 vertex per ~1km",  triangles: "~10K" }
        - { zoom: "10-13", resolution: "1 vertex per ~100m", triangles: "~100K" }
        - { zoom: "14-16", resolution: "1 vertex per ~10m",  triangles: "~500K" }
        - { zoom: "> 16",  resolution: "1 vertex per ~1m",   triangles: "~2M (instanced)" }
      z_exaggeration:
        default: 1.5
        range: [1.0, 5.0]
        control: "Slider in HUD panel"
      material:
        type: "Custom ShaderMaterial"
        base_texture: "Satellite + hillshade composite"
        normal_map: "Derived from DEM"
        ao: "Screen-space ambient occlusion, radius 4m"
        wireframe_mode: "Available for terrain analysis"
        wireframe_color: "rgba(0, 255, 65, 0.15)"

    camera:
      default_pitch: 60   # degrees from vertical (0 = top-down)
      pitch_range: [0, 85]
      default_bearing: 0   # north-up
      fov: 45
      near_clip: 1
      far_clip: 50000      # meters

    lighting:
      primary:
        type: "Directional"
        azimuth: 315
        altitude: 45
        color: "#ffffff"
        intensity: 0.8
      ambient:
        color: "#404040"
        intensity: 0.3
      note: >
        Lighting matches the 2D hillshade parameters so that
        switching between 2D and 3D views produces visually
        consistent terrain shading.

  # ─────────────────────────────────────────────────────────────────
  # 8.5 — NYC Datum Elevation Reference
  # ─────────────────────────────────────────────────────────────────

  nyc_datum_reference:
    description: >
      Elevation characteristics specific to the reference
      datum at 40° 41' 6.31" N, 73° 57' 46.42" W and the
      surrounding NYC metropolitan area of operations.

    landmarks:
      - name: "Reference point (Brooklyn)"
        elevation_m: 12
        note: "Residential elevation, Prospect Park vicinity"
      - name: "Todt Hill, Staten Island"
        elevation_m: 125
        note: "Highest point in NYC — dominant terrain feature"
      - name: "Fort Tryon Park, Manhattan"
        elevation_m: 76
        note: "Northern Manhattan ridgeline"
      - name: "Harbor mean sea level"
        elevation_m: 0
        note: "NAVD88 reference surface"
      - name: "East River channel depth"
        elevation_m: -15
        note: "Maintained navigation channel"
      - name: "Ambrose Channel"
        elevation_m: -16
        note: "Deep-water approach to harbor"

    terrain_character:
      overall: >
        Low-relief coastal terrain. Maximum relief ~140m
        across the entire AO. Urban canyon effects dominate
        over natural terrain at tactical scales. LiDAR DEM
        captures building rooftops as false terrain features
        unless bare-earth filtering is applied.
      dominant_features:
        - "Terminal moraine ridgeline (Brooklyn–Queens–Staten Island)"
        - "Harbor basin and tidal channels"
        - "Outwash plain south of moraine"
        - "Rocky ridgeline in upper Manhattan / Bronx"
      challenges:
        - "Low vertical relief requires high z-exaggeration for visibility"
        - "Building-terrain confusion in LiDAR DEM at zoom > 16"
        - "Tidal variation (±1.5m) affects littoral boundary rendering"
        - "Bridge deck elevations create false terrain saddles"

    recommended_settings:
      z_exaggeration: 3.0   # Higher than standard due to low relief
      contour_interval_m: 5  # Finer intervals for low-relief terrain
