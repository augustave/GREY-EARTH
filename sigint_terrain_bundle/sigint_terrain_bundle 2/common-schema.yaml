$schema: "https://json-schema.org/draft/2020-12/schema"
id: sigint-terrain-common-schema-v1
version: "1.0.0"
title: SIGINT Terrain Common Schema
summary: >
  Shared data contracts for the SIGINT Terrain Rendering Engine, swarm agents,
  and implementation package.

definitions:
  enums:
    device_class:
      type: string
      enum: [desktop_analyst, field_tablet, degraded_edge_device]
    terrain_profile_name:
      type: string
      enum: [standard_regional, nyc_littoral_low_relief, alpine_high_delta_z, urban_canyon_lidar]
    analysis_mode:
      type: string
      enum: [map_only, slope_overlay, elevation_profile, los_check, fresnel_check, terrain_3d, route_assessment]
    feed_age_tier:
      type: string
      enum: [CURRENT, RECENT, AGING, STALE, HISTORICAL]
    provenance_class:
      type: string
      enum: [high_res_lidar, medium_confidence, interpolated, synthetic, unknown]
    blend_mode:
      type: string
      enum: [normal, overlay, multiply, screen]
    warning_code:
      type: string
      enum:
        - bathymetry_merged
        - bathymetry_unavailable
        - urban_lidar_filter_applied
        - LOS_UNSAFE_DSM_CONTAMINATION
        - BATHYMETRY_REQUIRED_FOR_WATER_CROSSING
        - FEED_FRESHNESS_UNDEFINED
        - REDUCED_SEMANTIC_FIDELITY
        - Z_EXAGGERATION_CLAMPED
    verification_status:
      type: string
      enum: [pass, fail, warn, blocked]
    fresnel_result:
      type: string
      enum: [CLEAR, MASKED, FAILED_C_BAND, FAILED_VHF, UNKNOWN]

  geo_point:
    type: object
    additionalProperties: false
    required: [lat, lon]
    properties:
      lat:
        type: number
        minimum: -90
        maximum: 90
      lon:
        type: number
        minimum: -180
        maximum: 180
      height_m_agl:
        type: number

  bbox:
    type: object
    additionalProperties: false
    required: [min_lat, min_lon, max_lat, max_lon]
    properties:
      min_lat: { type: number }
      min_lon: { type: number }
      max_lat: { type: number }
      max_lon: { type: number }

  analysis_request:
    type: object
    additionalProperties: false
    required: [modes]
    properties:
      modes:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/enums/analysis_mode"
      observer_point:
        $ref: "#/$defs/geo_point"
      target_point:
        $ref: "#/$defs/geo_point"
      frequency_class:
        type: string
        enum: [VHF, UHF, L_BAND, S_BAND, C_BAND, X_BAND]
      transect_id:
        type: string
      requested_output_ids:
        type: array
        items:
          type: string

  viewport_context:
    type: object
    additionalProperties: false
    required: [device_class, width_px, height_px, zoom_level]
    properties:
      device_class:
        $ref: "#/$defs/enums/device_class"
      width_px:
        type: integer
        minimum: 1
      height_px:
        type: integer
        minimum: 1
      zoom_level:
        type: number
      pitch_deg:
        type: number
      target_fps:
        type: number
      supports_blend_modes:
        type: boolean
        default: true
      gpu_tier:
        type: string
        enum: [low, medium, high]

  terrain_profile:
    type: object
    additionalProperties: false
    required: [name]
    properties:
      name:
        $ref: "#/$defs/enums/terrain_profile_name"
      z_exaggeration:
        type: number
        minimum: 0.1
      contour_interval_m:
        type: number
        minimum: 0
      hillshade_altitude_deg:
        type: number
        minimum: 0
        maximum: 90
      hypsometric_bands:
        type: string
      require_bathymetry_merge:
        type: boolean
      warnings:
        type: array
        items:
          $ref: "#/$defs/enums/warning_code"

  sensor_feed:
    type: object
    additionalProperties: false
    required: [feed_id, provenance_class]
    properties:
      feed_id:
        type: string
      timestamp_utc:
        type: string
        format: date-time
      provenance_class:
        $ref: "#/$defs/enums/provenance_class"
      modality:
        type: string
      live_state:
        type: string
        enum: [live, cached, replayed, synthetic]

  layer_spec:
    type: object
    additionalProperties: false
    required: [id, blend]
    properties:
      id:
        type: string
      order:
        type: integer
        minimum: 1
      blend:
        $ref: "#/$defs/enums/blend_mode"
      opacity:
        type: number
        minimum: 0
        maximum: 1
      tier:
        type: string
      reason:
        type: string

  analysis_products:
    type: object
    additionalProperties: false
    properties:
      elevation_profile:
        type: boolean
      los_check:
        oneOf:
          - type: boolean
          - type: string
            enum: [LOS_CLEAR, LOS_MASKED, UNKNOWN]
      fresnel_check:
        oneOf:
          - type: boolean
          - $ref: "#/$defs/enums/fresnel_result"
      terrain_3d:
        type: boolean

  render_state_manifest:
    type: object
    additionalProperties: false
    required:
      [terrain_profile, vertical_datum, z_exaggeration, device_budget, layers_active, layers_suppressed, warnings, analysis_products]
    properties:
      terrain_profile:
        $ref: "#/$defs/enums/terrain_profile_name"
      vertical_datum:
        type: string
      water_crossing:
        type: boolean
      z_exaggeration:
        type: number
      device_budget:
        $ref: "#/$defs/enums/device_class"
      layers_active:
        type: array
        items:
          $ref: "#/$defs/layer_spec"
      layers_suppressed:
        type: array
        items:
          $ref: "#/$defs/layer_spec"
      warnings:
        type: array
        items:
          $ref: "#/$defs/enums/warning_code"
      analysis_products:
        $ref: "#/$defs/analysis_products"

  verification_check:
    type: object
    additionalProperties: false
    required: [check_id, status, message]
    properties:
      check_id:
        type: string
      status:
        $ref: "#/$defs/enums/verification_status"
      message:
        type: string
      evidence:
        type: array
        items:
          type: string

  verification_report:
    type: object
    additionalProperties: false
    required: [overall_status, checks]
    properties:
      overall_status:
        $ref: "#/$defs/enums/verification_status"
      checks:
        type: array
        items:
          $ref: "#/$defs/verification_check"
      blocking_errors:
        type: array
        items:
          type: string

type: object
additionalProperties: false
properties:
  analysis_request:
    $ref: "#/$defs/analysis_request"
  viewport_context:
    $ref: "#/$defs/viewport_context"
  terrain_profile:
    $ref: "#/$defs/terrain_profile"
  render_state_manifest:
    $ref: "#/$defs/render_state_manifest"
  verification_report:
    $ref: "#/$defs/verification_report"

$defs:
  enums:
    $ref: "#/definitions/enums"
  geo_point:
    $ref: "#/definitions/geo_point"
  bbox:
    $ref: "#/definitions/bbox"
  analysis_request:
    $ref: "#/definitions/analysis_request"
  viewport_context:
    $ref: "#/definitions/viewport_context"
  terrain_profile:
    $ref: "#/definitions/terrain_profile"
  sensor_feed:
    $ref: "#/definitions/sensor_feed"
  layer_spec:
    $ref: "#/definitions/layer_spec"
  analysis_products:
    $ref: "#/definitions/analysis_products"
  render_state_manifest:
    $ref: "#/definitions/render_state_manifest"
  verification_check:
    $ref: "#/definitions/verification_check"
  verification_report:
    $ref: "#/definitions/verification_report"
